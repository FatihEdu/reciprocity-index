<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Mütekabiliyet Endeksi</title>
  <style>
    :root {
      --bg: #f6f7f9;
      --panel: #ffffff;
      --panel-soft: #f9fafb;
      --text: #17202a;
      --muted: #64748b;
      --border: #e5e7eb;
      --accent: #111827;
      --good: #15803d;
      --bad: #b91c1c;
      --warn: #b45309;
      --blue: #1d4ed8;
    }
    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      margin: 0;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
    }
    .page-shell { max-width: 1180px; margin: 0 auto; padding: 2rem 1rem 3rem; }
    header.hero {
      background: linear-gradient(135deg, #ffffff, #f2f4f7);
      border: 1px solid var(--border);
      border-radius: 1.25rem;
      padding: 1.5rem;
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.05);
    }
    h1 { margin: 0 0 .4rem; font-size: clamp(1.9rem, 4vw, 3rem); letter-spacing: -0.04em; }
    h2 { margin: 1.5rem 0 .75rem; letter-spacing: -0.02em; }
    h3 { margin: 0 0 .75rem; }
    p { margin-top: 0; color: var(--muted); }
    .toolbar { display: flex; gap: .5rem; align-items: center; flex-wrap: wrap; margin-top: 1rem; }
    .lang-switch button, .nav-btn, .link-btn {
      border: 1px solid var(--border);
      background: #fff;
      color: var(--text);
      padding: .5rem .8rem;
      border-radius: .7rem;
      cursor: pointer;
      font-size: .95rem;
    }
    .lang-switch button[aria-pressed="true"] { background: var(--accent); color: #fff; border-color: var(--accent); }
    .nav-btn:hover, .link-btn:hover, .lang-switch button:hover { border-color: #9ca3af; }
    code { background: #eef2f7; padding: .15rem .35rem; border-radius: .35rem; font-size: .9em; }
    .app-shell { margin-top: 1.25rem; }
    .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: .8rem; margin: 1rem 0; }
    .stat-card, .panel, .split-card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 1rem;
      padding: 1rem;
      box-shadow: 0 6px 18px rgba(15, 23, 42, 0.04);
    }
    .stat-card strong { display: block; font-size: 1.35rem; color: var(--text); }
    .stat-card span { color: var(--muted); font-size: .9rem; }
    .panel { margin: 1rem 0; }
    .panel-header { display: flex; justify-content: space-between; gap: 1rem; align-items: flex-start; flex-wrap: wrap; }
    .table-wrap { overflow-x: auto; background: var(--panel); border: 1px solid var(--border); border-radius: 1rem; }
    table { border-collapse: collapse; width: 100%; font-size: .95rem; }
    th, td { border-bottom: 1px solid var(--border); padding: .72rem .8rem; text-align: left; vertical-align: top; }
    th { font-weight: 700; color: #111827; background: #f8fafc; position: sticky; top: 0; z-index: 1; }
    tr:last-child td { border-bottom: 0; }
    tr.clickable { cursor: pointer; }
    tr.clickable:hover td { background: #f8fafc; }
    tr:target td { background: #fff7ed; }
    .muted { color: var(--muted); }
    .score-pos { color: var(--good); font-weight: 700; }
    .score-neg { color: var(--bad); font-weight: 700; }
    .score-zero { color: var(--muted); font-weight: 700; }
    .badge { display: inline-flex; align-items: center; gap: .25rem; border-radius: 999px; padding: .2rem .55rem; font-size: .78rem; font-weight: 700; border: 1px solid transparent; white-space: nowrap; }
    .badge-egoist { color: #7c2d12; background: #ffedd5; border-color: #fed7aa; }
    .badge-unreciprocal { color: #7f1d1d; background: #fee2e2; border-color: #fecaca; }
    .badge-reciprocal { color: #14532d; background: #dcfce7; border-color: #bbf7d0; }
    .badge-positive { color: #1e3a8a; background: #dbeafe; border-color: #bfdbfe; }
    .badge-negative { color: #7f1d1d; background: #fef2f2; border-color: #fecaca; }
    .badge-neutral { color: #374151; background: #f3f4f6; border-color: #e5e7eb; }
    .filter-bar { background: var(--panel); padding: 1rem; border-radius: 1rem; margin: 1rem 0; border: 1px solid var(--border); }
    .filter-bar label { font-weight: 700; margin-right: .5rem; }
    .filter-bar select { padding: .45rem .55rem; border-radius: .55rem; border: 1px solid #cbd5e1; margin-right: .75rem; background: #fff; }
    .filter-custom { margin-top: 1rem; }
    .filter-custom select { width: 100%; height: 132px; padding: .5rem; margin-top: .5rem; }
    .split-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: .8rem; margin: 1rem 0; }
    .split-card ul { margin: .4rem 0 0; padding-left: 1.1rem; }
    .split-card li { margin: .25rem 0; }
    .chart { display: grid; gap: .55rem; margin-top: .75rem; }
    .bar-row { display: grid; grid-template-columns: minmax(120px, 1fr) minmax(160px, 3fr) 72px; gap: .7rem; align-items: center; font-size: .9rem; }
    .bar-track { height: 12px; border-radius: 999px; background: #eef2f7; overflow: hidden; display: flex; align-items: stretch; }
    .bar { min-width: 2px; border-radius: 999px; }
    .bar.neg { background: var(--bad); margin-left: auto; }
    .bar.pos { background: var(--good); }
    .bar.zero { background: #94a3b8; }
    .history-note { border-left: 4px solid #cbd5e1; padding-left: .85rem; color: var(--muted); }
    @media (max-width: 720px) {
      .bar-row { grid-template-columns: 1fr; gap: .25rem; }
      th, td { padding: .6rem; }
    }
  </style>
</head>
<body>
  <main class="page-shell">
    <header class="hero">
  <h1 id="main-title">Mütekabiliyet Endeksi</h1>
  <p id="main-desc">Bir ülke senden vize istiyorsa, sen de ondan vize istiyor musun?</p>
  <p id="main-note"><strong>Not:</strong> Buna daha ağır bir dille “Kapitülasyon Endeksi” de diyebiliriz.</p>

  <div class="toolbar">
    <div class="lang-switch" aria-label="Language switch">
      <button type="button" data-lang="tr" aria-pressed="true">Türkçe</button>
      <button type="button" data-lang="en" aria-pressed="false">English</button>
    </div>
  </div>

    </header>

    <div id="app" class="app-shell">Yükleniyor...</div>
  </main>

  <script type="module" src="./src/main.js"></script>
</body>
</html>
