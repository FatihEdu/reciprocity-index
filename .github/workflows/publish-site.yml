name: Publish Site

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "app/**"
      - "automation/henley/src/package_history.py"
      - "automation/henley/config/**"
      - ".github/workflows/publish-site.yml"

permissions:
  contents: read
  pages: write
  id-token: write

environment:
  name: github-pages
  url: ${{ steps.deployment.outputs.page_url }}

concurrency:
  group: publish-site
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          path: main-src

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Prepare data branch
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          REPO_URL="https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git clone --depth 1 --branch data "$REPO_URL" data-worktree

      - name: Build static site
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          cp -R main-src/app/. dist/
          mkdir -p dist/data/latest dist/data/map
          cp -R data-worktree/latest/. dist/data/latest/
          if [ -d data-worktree/assets ]; then
            cp -R data-worktree/assets/. dist/data/map/
          fi
          python main-src/automation/henley/src/package_history.py \
            --data-root data-worktree \
            --out-root dist/data/history
          touch dist/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
